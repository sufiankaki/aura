<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 675px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f1b2d 0%, #1a3a5c 40%, #0d2847 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
  overflow: hidden;
}

/* Subtle grid pattern */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Glow accent */
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(9,114,211,0.2) 0%, transparent 70%);
  top: -100px;
  right: -50px;
}

.glow2 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(3,127,12,0.15) 0%, transparent 70%);
  bottom: -80px;
  left: -50px;
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 900px;
}

.badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 6px 18px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 24px;
  color: #7eb8f0;
}

h1 {
  font-size: 52px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 16px;
  background: linear-gradient(to right, #ffffff, #a8d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 22px;
  color: #94b8d4;
  margin-bottom: 36px;
  font-weight: 300;
}

.services {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.service {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  color: #c8ddf0;
}

.author {
  position: absolute;
  bottom: 30px;
  right: 40px;
  font-size: 15px;
  color: #6a9ec4;
}

.logo {
  position: absolute;
  bottom: 30px;
  left: 40px;
  font-size: 14px;
  color: #4a7ea8;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="badge">Open Source Framework</div>
    <h1>Making Bedrock AgentCore<br>Agents Accessible to Everyone</h1>
    <p class="subtitle">Deploy a self-service web frontend for your AI agents in minutes</p>
    <div class="services">
      <div class="service">☁️ CloudFormation</div>
      <div class="service">🔐 Amazon Cognito</div>
      <div class="service">📊 DynamoDB</div>
      <div class="service">🌐 Amplify Hosting</div>
      <div class="service">🤖 AgentCore</div>
    </div>
  </div>
  <div class="author">by Sufian Kaki</div>
  <div class="logo">AURA — AgentCore Frontend Framework</div>
</body>
</html>
